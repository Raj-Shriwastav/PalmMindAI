name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-format:
    name: Lint & Code Style Checks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install black flake8

    - name: Check Formatting (Black)
      run: |
        # Assert code complies with standard Python formatting. 
        # (This will fail the build if there are formatting violations).
        black --check --verbose app/ tests/

    - name: Code Quality Checks (Flake8)
      run: |
        # Stop build on syntax errors or undefined names
        flake8 app/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all other warnings as warnings
        flake8 app/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  integration-tests:
    name: API & Database Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    
    # Configure test services to run integration tests under real environments
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: palmmind_test_secure_pass_2026
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.7.0
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl --fail http://localhost:6333/readyz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio httpx

    - name: Run Test Suite with Coverage
      env:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: palmmind_test_secure_pass_2026
        POSTGRES_DB: postgres
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        QDRANT_HOST: localhost
        QDRANT_PORT: 6333
        LLM_BASE_URL: http://localhost:8080/v1
        LLM_API_KEY: not-needed
        EMBEDDING_MODEL_NAME: Snowflake/snowflake-arctic-embed-m
      run: |
        # Run pytest, printing output and showing test coverage details
        pytest --cov=app tests/ -v

  docker-verify:
    name: Production Build Verification
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Verify Docker Production Build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: palmind-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
